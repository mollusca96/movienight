<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Movie Night</title>

<style>
body{
    background:#0e0e0e;
    color:white;
    font-family:system-ui;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}

.card{
    background:#1c1c1c;
    padding:30px;
    border-radius:20px;
    width:320px;
    box-shadow:0 0 30px rgba(0,0,0,.6);
}

button{
    margin:8px;
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#ff3c6f;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{background:#ff5c87}

.choice{
    display:block;
    width:100%;
    margin-top:10px;
    background:#2c2c2c;
}
</style>
</head>
<body>

<div class="card" id="app"></div>

<script>
const app=document.getElementById("app")
let movie="",food=""

function screen(html){app.innerHTML=html}

/* intro */
screen(`
<h2>Hi you</h2>
<p>I was thinking...</p>
<p>maybe we should have a movie night?</p>
<button onclick="accept()">okay</button>
`)

function accept(){
screen(`
<h2>Pick our movie 🎬</h2>
<button class="choice" onclick="pickMovie('Interstellar')">Interstellar</button>
<button class="choice" onclick="pickMovie('Shrek')">Shrek</button>
<button class="choice" onclick="pickMovie('Horror roulette')">Surprise me</button>
`)
}

function pickMovie(m){
movie=m
screen(`
<h2>Now snacks 🍿</h2>
<button class="choice" onclick="pickFood('Pizza')">Pizza</button>
<button class="choice" onclick="pickFood('Ice cream')">Ice cream</button>
<button class="choice" onclick="pickFood('Just you is enough')">Just you</button>
`)
}

function pickFood(f){
food=f
screen(`
<h2>Perfect.</h2>
<p>Tonight we watch</p>
<h3>${movie}</h3>
<p>with</p>
<h3>${food}</h3>

<p style="opacity:.7">send me this:</p>
<textarea id="msg" style="width:100%;height:80px">
Movie night approved.
Movie: ${movie}
Snack: ${food}
Be there.
</textarea>

<button onclick="copy()">copy message</button>
`)
}

function copy(){
navigator.clipboard.writeText(document.getElementById("msg").value)
alert("copied. send it to me.")
}
</script>

</body>
</html>
