<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movie Night</title>

<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:system-ui,Segoe UI,Roboto,Helvetica,Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    text-align:center;
    background-size:cover;
    background-position:center;
    transition:background-image .8s ease-in-out;
}

body::before{
    content:"";
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.6);
    backdrop-filter:blur(3px);
    z-index:-1;
}

.card{
    width:min(900px,92vw);
    background:rgba(20,20,20,.85);
    padding:28px;
    border-radius:22px;
    box-shadow:0 0 40px rgba(0,0,0,.6);
}

h1,h2,h3,p{margin:.4em 0}

button{
    margin-top:14px;
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#ff3c6f;
    color:white;
    font-size:16px;
    cursor:pointer;
}
button:hover{background:#ff5c87}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
    gap:14px;
    margin-top:18px;
}

.choice{
    background:#2a2a2a;
    border-radius:14px;
    padding:10px;
    cursor:pointer;
    transition:.2s;
}
.choice:hover{transform:scale(1.04);background:#333}

.choice img{
    width:100%;
    height:210px;
    object-fit:cover;
    border-radius:10px;
}

.small{opacity:.75;font-size:14px}
textarea{width:100%;height:100px;margin-top:10px;border-radius:12px;padding:10px}
</style>
</head>
<body>
<div class="card" id="app"></div>

<script>
const app=document.getElementById("app")
let movie="",food=""

function bg(name){document.body.style.backgroundImage=`url(images/${name})`}
function screen(html){app.innerHTML=html}

/* --- DATA --- */
const movies={
"Your Name":{
 img:"Your_Name_poster.png",
 desc:"Two strangers begin swapping lives across distance and time.",
 rating:"⭐ 8.4/10"
},
"Forgotten":{
 img:"Forgotten.jpg",
 desc:"A man investigates his brother after a suspicious disappearance.",
 rating:"⭐ 7.4/10"
},
"Enola Holmes":{
 img:"Enola_Holmes_poster.jpeg",
 desc:"Sherlock's younger sister solves mysteries her own way.",
 rating:"⭐ 6.6/10"
},
"Wake Up Dead Man":{
 img:"WakeUpDeadMan_poster.jpg",
 desc:"Benoit Blanc returns for another eccentric murder case.",
 rating:"⭐ upcoming chaos"
},
"The Thursday Murder Club":{
 img:"The_Thursday_Murder_Club_(film).jpg",
 desc:"Retirees solving crimes because they’re bored and brilliant.",
 rating:"⭐ cozy mystery vibes"
}
}

const foods={
"Dapur Oppa":"dapur_oppa.jpeg",
"Mujigae":"mujigae.png",
"Nata Dimsum":"nata_dimsum.jpeg",
"Pizza Hut":"pizza_hut.png",
"HokBen":"hokben.png"
}

/* --- INTRO --- */
bg("cover.png")
screen(`
<h1>Hi you</h1>
<p>I prepared something important</p>
<p>Will you join me for a movie night?</p>
<button onclick="pickMovie()">okay</button>
`)

/* --- MOVIES --- */
function pickMovie(){
bg("Your_Name_poster.png")
let html=`<h2>Pick our movie 🎬</h2><div class="grid">`
for(const name in movies){
 const m=movies[name]
 html+=`
 <div class="choice" onclick="selectMovie('${name}')">
 <img src="images/${m.img}">
 <h3>${name}</h3>
 <div class="small">${m.desc}</div>
 <div class="small">${m.rating}</div>
 </div>`
}
html+=`</div>`
screen(html)
}

function selectMovie(name){
movie=name
bg(movies[name].img)
pickFood()
}

/* --- FOOD --- */
function pickFood(){
let html=`<h2>Important decision 🍜</h2><div class="grid">`
for(const name in foods){
 html+=`
 <div class="choice" onclick="selectFood('${name}')">
 <img src="images/${foods[name]}">
 <h3>${name}</h3>
 </div>`
}
html+=`</div>`
screen(html)
}

function selectFood(name){
food=name
bg(foods[name])
final()
}

/* --- FINAL --- */
function final(){
screen(`
<h2>Perfect.</h2>
<p>Tonight we watch</p>
<h2>${movie}</h2>
<p>with</p>
<h2>${food}</h2>
<p class="small">send me this:</p>
<textarea id="msg">Movie night approved.
Movie: ${movie}
Food: ${food}
Be there.</textarea>
<button onclick="copy()">copy message</button>
`)
}

function copy(){navigator.clipboard.writeText(document.getElementById("msg").value);alert("copied. send it to me.")}
</script>
</body>
</html>
